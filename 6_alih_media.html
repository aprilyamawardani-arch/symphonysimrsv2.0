<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Symphony SIMRS - Form Alih Media</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: transparent;">

    <div class="content-body" style="padding: 30px;">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <h3 style="border-left: 4px solid #f59e0b;">🔄 Alih Media Berkas Transisional (Fisik ke RME)</h3>
            <p style="font-size: 12px; color: #64748b; margin-bottom: 20px;">
                Masukkan data lembar rekam medis fisik kertas kuno ke dalam ekosistem database terpusat Symphony SIMRS.
            </p>

            <form onsubmit="simpanAlihMedia(event)">
                <div class="form-group">
                    <label>Nomor Rekam Medis Pasien (Bisa Diisi/Diedit Manual)</label>
                    <!-- Kolom No. RM dibuat bisa diedit manual -->
                    <input type="text" id="alihRM" style="font-weight: bold; color: #b45309;" required>
                </div>

                <div class="form-group">
                    <label>Nama Lengkap Pasien</label>
                    <input type="text" id="alihNama" required style="text-transform: uppercase;">
                </div>

                <div class="form-group">
                    <label>Kecamatan Domisili Pasien</label>
                    <input type="text" id="alihAlamat" value="Kebon Jeruk, Jakarta Barat">
                </div>

                <div class="form-group">
                    <label>Petugas Alih Media Penanggung Jawab</label>
                    <input type="text" value="adminrmik (Perekam Medis Terverifikasi)" readonly style="background:#f1f5f9;">
                </div>

                <div style="margin-top: 25px; display: flex; gap: 10px;">
                    <button type="submit" class="btn-next-step" style="background:linear-gradient(135deg, #f59e0b 0%, #d97706 100%)">✔️ Selesai (Migrasikan ke Database)</button>
                    <button type="button" class="btn-action" style="background:#94a3b8;" onclick="window.location.href='6_audit_trail.html'">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Mengisi form otomatis berdasarkan baris tabel pasien fisik yang dipilih tadi
        window.onload = function() {
            document.getElementById("alihRM").value = localStorage.getItem("temp_AlihRM") || "";
            document.getElementById("alihNama").value = localStorage.getItem("temp_AlihNama") || "";
        };

        function simpanAlihMedia(e) {
            e.preventDefault();
            
            const finalRM = document.getElementById("alihRM").value;
            const finalNama = document.getElementById("alihNama").value.toUpperCase();

            // Set tanda keberhasilan ke sistem memori simrs
            localStorage.setItem("alihMedia_RM", finalRM);
            localStorage.setItem("alihMedia_Nama", finalNama);

            try {
                const currentUser = localStorage.getItem('sessionUser') || 'unknown';
                const auditEntry = {
                    user: currentUser,
                    action: `Melakukan alih media berkas pasien: ${finalNama} (RM ${finalRM})`,
                    system: 'Alih Media'
                };
                if (window.parent && window.parent.addAuditEntry) {
                    window.parent.addAuditEntry(auditEntry);
                } else {
                    const auditList = JSON.parse(localStorage.getItem('auditTrail')) || [];
                    auditList.push({ timestamp: new Date().toISOString(), ...auditEntry });
                    localStorage.setItem('auditTrail', JSON.stringify(auditList));
                }
            } catch(err) {
                console.error('audit alih media error', err);
            }

            alert("Proses Alih Media Berhasil! Status berkas pasien telah dimigrasikan penuh menjadi ELEKTRONIK (RME).");
            
            // Pindah kembali otomatis ke halaman audit & log
            window.location.href = "6_audit_trail.html";
        }
    </script>
</body>
</html>
